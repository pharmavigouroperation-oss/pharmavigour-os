<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVO OS | Corporate ERP</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #f8fafc; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #064e3b; color: #fef08a; padding: 15px; font-weight: bold; }
        .main-wrapper { display: flex; flex: 1; overflow: hidden; }
        .sidebar { background: #0f172a; color: white; width: 180px; }
        .menu { padding: 15px; cursor: pointer; border-bottom: 1px solid #1e293b; }
        .sub-menu { display: none; background: #1e293b; }
        .sub-menu div { padding: 10px 25px; font-size: 13px; color: #cbd5e1; cursor: pointer; }
        .content { flex: 1; padding: 20px; overflow-y: auto; }
        .panel { display: none; background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; }
        .panel.active { display: block !important; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    </style>
</head>
<body>
    <div class="header">PVO Central System</div>
    <div class="main-wrapper">
        <div class="sidebar">
            <div class="menu" onclick="toggle('sSub')">Sales</div>
            <div id="sSub" class="sub-menu">
                <div onclick="show('newSale')">New Sale Bill</div>
                <div onclick="show('saleHist')">Sale History</div>
            </div>
            <div class="menu" onclick="toggle('pSub')">Purchase</div>
            <div id="pSub" class="sub-menu">
                <div onclick="show('newPur')">Stock Inward</div>
                <div onclick="show('inventory')">Inventory</div>
            </div>
        </div>
        <div class="content">
            <div id="newSale" class="panel active">
                <h2>New Sale Bill Terminal</h2>
                <input type="text" style="width:100%; padding:10px; margin:10px 0;" placeholder="Search Product...">
                <table>
                    <thead><tr><th>Item</th><th>Qty</th><th>Price</th></tr></thead>
                    <tbody><tr><td>Medicine Sample</td><td>1</td><td>₹50</td></tr></tbody>
                </table>
                <button style="width:100%; padding:15px; background:#064e3b; color:white; border:none; margin-top:10px;">Complete Bill</button>
            </div>
            <div id="saleHist" class="panel"><h2>Sale History</h2></div>
            <div id="newPur" class="panel"><h2>Stock Inward</h2></div>
            <div id="inventory" class="panel"><h2>Inventory Details</h2></div>
        </div>
    </div>
    <script>
        function show(id) { document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function toggle(id) { let el = document.getElementById(id); el.style.display = (el.style.display == 'block') ? 'none' : 'block'; }
    </script>
</body>
</html>
