<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PharmaVigour OS - Corporate Cloud ERP</title>
    <style>
        /* [পূর্বের CSS সব বজায় থাকবে, নতুনটুকু নিচে যোগ করুন] */
        .search-container { position: relative; width: 100%; }
        .search-box { width: 100%; padding: 12px; border: 2px solid #064e3b; border-radius: 6px; font-size: 14px; outline: none; }
        .suggestions-box { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #cbd5e1; border-radius: 0 0 6px 6px; max-height: 250px; overflow-y: auto; z-index: 9999; display: none; box-shadow: 0 8px 16px rgba(0,0,0,0.15); }
        .suggestion-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        .suggestion-item:hover { background-color: #f0fdf4; color: #064e3b; font-weight: bold; }
        .suggestion-item span.stock-pill { font-size: 10px; background: #e2e8f0; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

<!-- [লগইন এবং সাইডবার অংশ অপরিবর্তিত থাকবে] -->

<!-- 🧮 VIEW: 1.1 POINT OF SALE TERMINAL (WITH SMART SEARCH) -->
<div id="newSaleView" class="view-panel active">
    <!-- ... (অন্যান্য ফিল্ড অপরিবর্তিত) ... -->
    <div class="search-container">
        <input type="text" id="searchBox" class="search-box" placeholder="Start typing drug name (e.g. PA for PAN-D)..." oninput="handleSmartSearch(this.value)">
        <div id="suggestions" class="suggestions-box"></div>
    </div>
    <!-- ... (বাকি টেবিল ও বাটন অপরিবর্তিত) ... -->
</div>

<script>
    // ⚡ 1. SMART PREDICTIVE SEARCH ENGINE
    function handleSmartSearch(query) {
        const suggestionsBox = document.getElementById('suggestions');
        if (query.length < 1) { suggestionsBox.style.display = 'none'; return; }
        
        let inventory = pullStock();
        // ডিকশনারি স্টাইল এবং জিরো স্টক হাইড লজিক
        let matches = inventory.filter(p => 
            p.product_name.toLowerCase().startsWith(query.toLowerCase()) && p.stock > 0
        );

        suggestionsBox.innerHTML = '';
        if (matches.length > 0) {
            matches.forEach(product => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerHTML = `<strong>${product.product_name}</strong> <span class="stock-pill">Stock: ${product.stock}</span>`;
                div.onclick = () => addProductToActiveBillingCart(product);
                suggestionsBox.appendChild(div);
            });
            suggestionsBox.style.display = 'block';
        } else {
            suggestionsBox.innerHTML = '<div class="suggestion-item">No active stock found...</div>';
            suggestionsBox.style.display = 'block';
        }
    }

    function addProductToActiveBillingCart(product) {
        document.getElementById('searchBox').value = ''; 
        document.getElementById('suggestions').style.display = 'none';
        if (!activeCart.find(item => item.id === product.id)) activeCart.push({...product, qty: 1, discount: 0});
        renderActiveCartTableManifest();
    }
    
    // [বাকি জাভাস্ক্রিপ্ট আগের মতোই থাকবে]
</script>
</body>
</html>
