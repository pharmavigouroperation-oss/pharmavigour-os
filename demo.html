<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PharmaVigour OS - OTP Secure Cloud ERP</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #f5f4f0; color: #1e293b; min-height: 100vh; padding: 20px 0; }
        
        /* 🎨 STABLE MOBILE & TABLET LOG-IN CONTAINER */
        #loginScreen { display: block; width: 100%; max-width: 420px; margin: 40px auto; padding: 0 15px; }
        .login-card { background: #fdfdfb; width: 100%; padding: 35px 25px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); text-align: center; border-top: 5px solid #d97706; border-bottom: 1px solid #e2e8f0; }
        .login-logo { width: 120px; height: auto; margin-bottom: 12px; }
        .login-card h2 { color: #064e3b; margin-bottom: 6px; font-size: 24px; font-weight: 700; }
        .login-card p { color: #64748b; font-size: 13px; margin-bottom: 25px; font-style: italic; }
        
        .field-label { display: block; text-align: left; font-size: 12px; font-weight: bold; color: #064e3b; margin-bottom: 6px; }
        .login-field { width: 100%; padding: 12px; margin-bottom: 16px; border: 2px solid #cbd5e1; border-radius: 6px; font-size: 16px; font-weight: bold; letter-spacing: 1px; outline: none; background: #ffffff; color: #000000; text-align: center; display: block; }
        .login-field:focus { border-color: #d97706; }
        
        .login-btn { width: 100%; padding: 14px; background: #064e3b; color: #fef08a; border: 1px solid #d97706; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; display: block; transition: all 0.2s; }
        .login-btn:hover { background: #022c22; }
        .login-error { background: #fee2e2; color: #ef4444; padding: 10px; border-radius: 6px; font-size: 13px; font-weight: bold; margin-bottom: 15px; display: none; border: 1px solid #fca5a5; }
        
        .otp-box-section { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #cbd5e1; }
        .demo-shortcut-box { margin-top: 20px; background: #f1f5f9; padding: 12px; border-radius: 6px; font-size: 12px; color: #475569; line-height: 1.6; text-align: left; border: 1px solid #e2e8f0; }

        /* 🏠 DASHBOARD CONTROLS INTERFACE */
        #dashboardScreen { display: none; min-height: 100vh; flex-direction: column; background-color: #f5f4f0; }
        .top-navbar { background: #064e3b; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #d97706; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .navbar-brand { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .navbar-logo { height: 35px; width: auto; background: white; border-radius: 4px; padding: 2px; }
        .navbar-brand h1 { font-size: 18px; font-weight: 700; color: #fef08a; }
        .navbar-user { display: flex; align-items: center; gap: 12px; font-size: 13px; }
        .logout-link { color: #fca5a5; cursor: pointer; font-weight: bold; text-decoration: none; margin-left: 5px; }
        .role-badge { padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: bold; background: #fef08a; color: #854d0e; }
        .outlet-badge { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; background: #2563eb; color: white; }

        .workspace { display: flex; flex: 1; position: relative; }
        .sidebar { background: #0f172a; color: #cbd5e1; width: 240px; padding: 20px 0; display: flex; flex-direction: column; gap: 4px; box-shadow: 2px 0 5px rgba(0,0,0,0.05); }
        .menu-item { padding: 12px 20px; font-weight: 600; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; border-left: 4px solid transparent; }
        .menu-item:hover, .menu-item.active { background: #1e293b; color: white; border-left-color: #d97706; }
        .submenu-list { background: #020617; display: none; padding: 4px 0; }
        .submenu-list.open { display: block; }
        .submenu-item { padding: 10px 20px 10px 35px; font-size: 13px; color: #94a3b8; cursor: pointer; }
        .submenu-item:hover, .submenu-item.active { color: #fef08a; background: #0f172a; }

        .main-content { flex: 1; padding: 25px; overflow-y: auto; position: relative; }
        .main-content::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url('logo.jpg'); background-repeat: no-repeat; background-position: center center; background-size: 450px; opacity: 0.035; pointer-events: none; z-index: 0; }
        
        .view-panel { display: none; position: relative; z-index: 1; }
        .view-panel.active { display: block; }
        
        .card-box { background: white; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.02); margin-bottom: 20px; }
        .panel-title { font-size: 18px; color: #064e3b; margin-bottom: 15px; font-weight: bold; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; }
        .meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; background: #fafafa; padding: 15px; border-radius: 6px; border: 1px solid #e2e8f0; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 12px; }
        .form-group label { font-size: 12px; color: #064e3b; font-weight: bold; margin-bottom: 5px; text-align: left; }
        .form-group input, .form-group select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 14px; outline: none; background: white; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th { background-color: #064e3b; color: white; padding: 12px 10px; text-align: left; border-bottom: 2px solid #d97706; }
        td { padding: 10px; border-bottom: 1px solid #e2e8f0; text-align: left; background: rgba(255,255,255,0.8); }
        
        .btn-container { margin-top: 25px; display: flex; gap: 15px; justify-content: flex-end; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-success { background: #d97706; color: white; border: 1px solid #b45309; }
        .btn-primary { background: #064e3b; color: #fef08a; border: 1px solid #d97706; }
        .btn-danger { background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; }
        
        .search-box { width: 100%; padding: 12px; border: 2px solid #064e3b; border-radius: 6px; font-size: 14px; outline: none; }
        .suggestions-box { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #cbd5e1; border-radius: 0 0 6px 6px; max-height: 200px; overflow-y: auto; z-index: 1000; display: none; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        .suggestion-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #f1f5f9; text-align: left; font-size: 13px; }
        .suggestion-item:hover { background-color: #f0fdf4; color: #064e3b; font-weight: bold; }
        .qty-input, .disc-input { width: 65px; padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; text-align: center; font-weight: bold; }
        .summary-box { margin-top: 20px; display: flex; justify-content: flex-end; }
        .summary-table { width: 300px; }
        .summary-table td { padding: 6px 10px; border: none; }
        .total-row { background: #f8fafc !important; font-size: 15px; color: #064e3b; font-weight: bold; border-top: 2px solid #e2e8f0 !important; }

        .bill-header-print { display: none; }
        .print-text-val { display: none; font-weight: bold; }

        @media print {
            .sidebar, .top-navbar, .search-section, .btn-container, .btn-danger, th:last-child, td:last-child, .meta-grid input, .qty-input, .disc-input { display: none !important; }
            .print-text-val { display: inline-block !important; }
            body, .main-content, .card-box { background: white !important; padding: 0; margin: 0; box-shadow: none; border: none; }
            .bill-header-print { display: flex !important; align-items: center; justify-content: space-between; border-bottom: 2px solid #064e3b; padding-bottom: 15px; margin-bottom: 25px; }
