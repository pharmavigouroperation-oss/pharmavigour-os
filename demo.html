<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaVigour OS - Live Demo Enterprise ERP</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #f5f4f0; color: #1e293b; }
        
        /* 🎨 BRAND COLOR THEME */
        #loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #022c22 0%, #064e3b 100%); padding: 20px; }
        .login-card { background: #fdfdfb; width: 100%; max-width: 400px; padding: 35px 30px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); text-align: center; border-top: 5px solid #d97706; }
        .login-logo { width: 140px; height: auto; margin-bottom: 15px; }
        .login-card h2 { color: #064e3b; margin-bottom: 6px; font-size: 22px; font-weight: 700; }
        .login-card p { color: #64748b; font-size: 13px; margin-bottom: 24px; font-style: italic; }
        .login-field { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; outline: none; }
        .login-btn { width: 100%; padding: 12px; background: #064e3b; color: #fef08a; border: 1px solid #d97706; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .login-error { color: #ef4444; font-size: 13px; margin-bottom: 12px; display: none; }
        .demo-btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .quick-demo-btn { flex: 1; background: transparent; color: #d97706; border: 1px dashed #d97706; padding: 8px 6px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; }

        /* 🏠 MAIN DASHBOARD INTERFACE */
        #dashboardScreen { display: none; min-height: 100vh; flex-direction: column; }
        .top-navbar { background: #064e3b; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #d97706; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .navbar-brand { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .navbar-logo { height: 35px; width: auto; background: white; border-radius: 4px; padding: 2px; }
        .navbar-brand h1 { font-size: 18px; font-weight: 700; color: #fef08a; }
        .navbar-user { display: flex; align-items: center; gap: 15px; font-size: 14px; }
        .logout-link { color: #fca5a5; cursor: pointer; font-weight: bold; text-decoration: none; }

        .workspace { display: flex; flex: 1; position: relative; }
        .sidebar { background: #0f172a; color: #cbd5e1; width: 240px; padding: 20px 0; display: flex; flex-direction: column; gap: 4px; box-shadow: 2px 0 5px rgba(0,0,0,0.05); }
        .menu-item { padding: 12px 20px; font-weight: 600; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; border-left: 4px solid transparent; }
        .menu-item:hover, .menu-item.active { background: #1e293b; color: white; border-left-color: #d97706; }
        .submenu-list { background: #020617; display: none; padding: 4px 0; }
        .submenu-list.open { display: block; }
        .submenu-item { padding: 10px 20px 10px 35px; font-size: 13px; color: #94a3b8; cursor: pointer; }
        .submenu-item:hover, .submenu-item.active { color: #fef08a; background: #0f172a; }

        .main-content { flex: 1; padding: 25px; overflow-y: auto; position: relative; background-color: #f5f4f0; }
        .main-content::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url('logo.jpg'); background-repeat: no-repeat; background-position: center center; background-size: 450px; opacity: 0.035; pointer-events: none; z-index: 0; }
        
        .view-panel { display: none; position: relative; z-index: 1; }
        .view-panel.active { display: block; }

        /* UI Blocks CSS */
        .modules-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .module-card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); text-align: center; cursor: pointer; border: 1px solid #e2e8f0; }
        .module-card:hover { transform: translateY(-3px); border-color: #d97706; box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
        .module-card h3 { font-size: 17px; color: #064e3b; margin-bottom: 6px; }
        
        .card-box { background: white; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.02); margin-bottom: 20px; }
        .panel-title { font-size: 18px; color: #064e3b; margin-bottom: 15px; font-weight: bold; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; }
        
        .meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; background: #fafafa; padding: 15px; border-radius: 6px; border: 1px solid #e2e8f0; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 12px; }
        .form-group label { font-size: 12px; color: #064e3b; font-weight: bold; margin-bottom: 5px; text-align: left; }
        .form-group input, .form-group select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 14px; outline: none; background: white; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th { background-color: #064e3b; color: white; padding: 12px 10px; text-align: left; border-bottom: 2px solid #d97706; }
        td { padding: 10px; border-bottom: 1px solid #e2e8f0; text-align: left; background: rgba(255,255,255,0.8); }
        
        .btn-container { margin-top: 25px; display: flex; gap: 15px; justify-content: flex-end; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-primary { background: #064e3b; color: #fef08a; border: 1px solid #d97706; }
        .btn-success { background: #d97706; color: white; border: 1px solid #b45309; }
        .btn-danger { background: #ef4444; color: white; border: 1px solid #dc2626; padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; }
        .btn-edit { background: #3b82f6; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: bold; margin-right: 5px; }
        .role-badge { padding: 3px 8px; border-radius: 20px; font-size: 12px; font-weight: bold; background: #fef08a; color: #854d0e; }
        .csv-upload-box { background: #fffbeb; border: 2px dashed #d97706; padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <img class="login-logo" src="logo.jpg" alt="PharmaVigour Logo">
        <h2>PharmaVigour OS</h2>
        <p>Bridging Expertise with Expansion</p>
