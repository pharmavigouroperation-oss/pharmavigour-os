<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaVigour OS - Corporate Cloud ERP</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #f8fafc; color: #0f172a; min-height: 100vh; }
        
        /* LOGIN & DASHBOARD STRUCTURE */
        #loginScreen { display: block; width: 100%; max-width: 400px; margin: 50px auto; padding: 20px; text-align: center; background: #fff; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #dashboardScreen { display: none; height: 100vh; flex-direction: column; }
        .top-navbar { background: #064e3b; color: #fef08a; padding: 15px; display: flex; justify-content: space-between; }
        .workspace { display: flex; flex: 1; overflow: hidden; }
        .sidebar { background: #0f172a; color: white; width: 220px; }
        .menu-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #1e293b; }
        .submenu { display: none; background: #1e293b; }
        .submenu div { padding: 12px 30px; font-size: 13px; color: #cbd5e1; cursor: pointer; }
        .main-content { flex: 1; padding: 20px; overflow-y: auto; }
        
        /* PANELS */
        .panel { display: none; background: white; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .panel.active { display: block !important; }
        
        /* FORM & TABLE */
        .input-box { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #064e3b; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #064e3b; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<!-- LOGIN SECTION -->
<div id="loginScreen">
    <h2>PharmaVigour OS</h2>
    <input type="tel" id="userPhone" class="input-box" placeholder="Registered Mobile Number">
    <button id="sendOtpBtn" onclick="sendOtp()" style="width:100%; padding:15px; background:#064e3b; color:white; border:none; cursor:pointer;">Generate Token</button>
    
    <div id="otpSection" style="display:none; margin-top:20px;">
        <input type="password" id="inputOtp" class="input-box" placeholder="1234">
        <button onclick="login()" style="width:100%; padding:15px; background:#d97706; color:white; border:none; cursor:pointer;">Authorize Session</button>
    </div>
</div>

<!-- DASHBOARD SECTION -->
<div id="dashboardScreen">
    <div class="top-navbar">
        <span>PVO Central System</span>
        <span onclick="location.reload()" style="cursor:pointer;">Logout</span>
    </div>
    <div class="workspace">
        <div class="sidebar">
            <div class="menu-item" onclick="toggleMenu('saleSub')">Sales</div>
            <div id="saleSub" class="submenu">
                <div onclick="showPanel('newSale')">New Sale Bill</div>
                <div onclick="showPanel('saleHist')">Sale History</div>
            </div>
            <div class="menu-item" onclick="toggleMenu('purSub')">Purchase</div>
            <div id="purSub" class="submenu">
                <div onclick="showPanel('newPur')">Stock Inward</div>
                <div onclick="showPanel('inventory')">Inventory</div>
            </div>
        </div>
        <div class="main-content">
            <div id="home" class="panel active"><h2>Dashboard Home</h2></div>
            <div id="newSale" class="panel">
                <h2>New Sale Bill Terminal</h2>
                <input type="text" class="input-box" placeholder="Scan or Search Product...">
                <table>
                    <thead><tr><th>Item</th><th>Qty</th><th>Price</th></tr></thead>
                    <tbody><tr><td>Medicine A</td><td>1</td><td>₹50</td></tr></tbody>
                </table>
                <button onclick="alert('Bill Processed')" style="width:100%; padding:15px; background:#064e3b; color:white; border:none; margin-top:20px;">Complete Bill</button>
            </div>
            <div id="saleHist" class="panel"><h2>Sale History</h2></div>
            <div id="newPur" class="panel"><h2>Stock Inward</h2></div>
            <div id="inventory" class="panel"><h2>Inventory</h2></div>
        </div>
    </div>
</div>

<script>
    function sendOtp() { document.getElementById('otpSection').style.display='block'; alert("Token: 1234"); }
    function login() { 
        if(document.getElementById('inputOtp').value=='1234') { 
            document.getElementById('loginScreen').style.display='none'; 
            document.getElementById('dashboardScreen').style.display='flex'; 
        } else { alert("Wrong Token!"); }
    }
    function showPanel(id) { 
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); 
    }
    function toggleMenu(id) { 
        let el = document.getElementById(id); 
        el.style.display = (el.style.display == 'block') ? 'none' : 'block'; 
    }
</script>
</body>
</html>
